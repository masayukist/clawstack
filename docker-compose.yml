services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ./var/ollama:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./var/open-webui:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    ports:
      - "18789:18789"
    environment:
      OLLAMA_API_KEY: "ollama-local"
    volumes:
      - ./openclaw/config:/home/node/.openclaw
      - ./openclaw/workspace:/home/node/.openclaw/workspace
    depends_on:
      - ollama
    restart: unless-stopped

  archive-approver-bot:
    build: ./archive_approver_bot
    container_name: archive-approver-bot
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      FASTAPI_BASE_URL: ${FASTAPI_BASE_URL}
      OPENCLAW_BOT_USER_ID: ${OPENCLAW_BOT_USER_ID}
      APPROVER_USER_ID: ${APPROVER_USER_ID}
    depends_on:
      - fastapi
    restart: unless-stopped

  fastapi:
    build: ./fastapi
    container_name: fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi/token.json:/app/token.json:ro
      - ./fastapi/token_modify.json:/app/token_modify.json:ro
    restart: unless-stopped
